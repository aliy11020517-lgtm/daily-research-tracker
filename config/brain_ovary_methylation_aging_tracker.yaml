notes:
  - "For brain research, do not rely only on blood-based clocks; prioritize cortex, brain-region, and cell-type-specific methylation clocks."
  - "For ovary research, include granulosa cells, cumulus cells, follicular fluid, oocytes, ovarian reserve, AMH, AFC, IVF, DOR, POI, and menopause-related terms."
  - "Separate chronological age prediction from biological age, mortality risk, disease risk, and pace of aging."
  - "Track whether each clock was trained in the same tissue where it is applied."
  - "Always record whether cell-type composition was adjusted, especially for brain and ovarian tissue."
  - "For organ clocks, distinguish true organ-specific DNAm clocks from blood-based proxies of organ aging."
