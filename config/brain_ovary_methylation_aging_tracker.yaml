query_templates:
  pubmed_brain:
    description: "Brain-specific DNA methylation aging clock search"
    query: >
      (("DNA methylation"[Title/Abstract] OR DNAm[Title/Abstract] OR methylome[Title/Abstract] OR CpG[Title/Abstract])
      AND
      ("epigenetic clock"[Title/Abstract] OR "DNA methylation age"[Title/Abstract] OR "DNAm age"[Title/Abstract] OR
       "biological age"[Title/Abstract] OR "age acceleration"[Title/Abstract] OR "pace of aging"[Title/Abstract])
      AND
      (brain[Title/Abstract] OR cortex[Title/Abstract] OR cortical[Title/Abstract] OR "cortical clock"[Title/Abstract] OR
       hippocampus[Title/Abstract] OR cerebellum[Title/Abstract] OR neuron*[Title/Abstract] OR glia[Title/Abstract] OR
       astrocyte*[Title/Abstract] OR microglia[Title/Abstract] OR oligodendrocyte*[Title/Abstract]))

  pubmed_ovary:
    description: "Ovary and reproductive aging methylation clock search"
    query: >
      (("DNA methylation"[Title/Abstract] OR DNAm[Title/Abstract] OR methylome[Title/Abstract] OR CpG[Title/Abstract])
      AND
      ("epigenetic clock"[Title/Abstract] OR "DNA methylation age"[Title/Abstract] OR "DNAm age"[Title/Abstract] OR
       "biological age"[Title/Abstract] OR "age acceleration"[Title/Abstract] OR "pace of aging"[Title/Abstract])
      AND
      (ovary[Title/Abstract] OR ovarian[Title/Abstract] OR oocyte*[Title/Abstract] OR "granulosa cell"[Title/Abstract] OR
       "cumulus cell"[Title/Abstract] OR "follicular fluid"[Title/Abstract] OR follicle*[Title/Abstract] OR
       "ovarian reserve"[Title/Abstract] OR AMH[Title/Abstract] OR AFC[Title/Abstract] OR IVF[Title/Abstract] OR
       "reproductive aging"[Title/Abstract] OR menopause[Title/Abstract] OR "premature ovarian insufficiency"[Title/Abstract]))

  pubmed_organ_clock:
    description: "Organ/tissue/cell-type-specific methylation clock search"
    query: >
      (("DNA methylation"[Title/Abstract] OR DNAm[Title/Abstract] OR methylome[Title/Abstract] OR CpG[Title/Abstract])
      AND
      ("epigenetic clock"[Title/Abstract] OR "DNA methylation clock"[Title/Abstract] OR "biological age"[Title/Abstract] OR
       "DNA methylation age"[Title/Abstract] OR "age acceleration"[Title/Abstract])
      AND
      ("organ-specific"[Title/Abstract] OR "tissue-specific"[Title/Abstract] OR "cell-type-specific"[Title/Abstract] OR
       "multi-organ"[Title/Abstract] OR "multi-tissue"[Title/Abstract] OR "cross-tissue"[Title/Abstract] OR
       "system-specific"[Title/Abstract]))

  pubmed_named_clocks:
    description: "Named clock search for brain/ovary comparator studies"
    query: >
      ((Horvath[Title/Abstract] OR Hannum[Title/Abstract] OR PhenoAge[Title/Abstract] OR GrimAge[Title/Abstract] OR
        GrimAge2[Title/Abstract] OR DunedinPACE[Title/Abstract] OR DunedinPoAm[Title/Abstract] OR AltumAge[Title/Abstract])
      AND
      (methylation[Title/Abstract] OR DNAm[Title/Abstract])
      AND
      (brain[Title/Abstract] OR cortex[Title/Abstract] OR ovary[Title/Abstract] OR ovarian[Title/Abstract] OR
       oocyte[Title/Abstract] OR granulosa[Title/Abstract] OR "reproductive aging"[Title/Abstract]))

  biorxiv_arxiv_brain:
    query: >
      ("DNA methylation" OR DNAm OR methylome)
      AND
      ("epigenetic clock" OR "DNA methylation age" OR "biological age" OR "age acceleration")
      AND
      (brain OR cortex OR cortical OR hippocampus OR neuron OR glia OR neurodegeneration)

  biorxiv_arxiv_ovary:
    query: >
      ("DNA methylation" OR DNAm OR methylome)
      AND
      ("epigenetic clock" OR "DNA methylation age" OR "biological age" OR "age acceleration")
      AND
      (ovary OR ovarian OR oocyte OR granulosa OR cumulus OR "follicular fluid" OR "ovarian reserve" OR IVF OR AMH)

inclusion_criteria:
  must_have_one:
    - "DNA methylation or methylome data"
    - "epigenetic clock, DNAm age, biological age, age acceleration, aging pace, or methylation aging biomarker"
    - "new clock model, clock application, clock benchmarking, or clock-related biological interpretation"

  preferred:
    - "brain tissue, brain cell type, or neurodegenerative phenotype"
    - "ovarian tissue, oocyte, granulosa cell, cumulus cell, follicular fluid, or reproductive aging phenotype"
    - "organ-specific, tissue-specific, system-specific, or cell-type-specific aging clock"
    - "external validation"
    - "public data or code"
    - "human cohort"
    - "clear sample size and methylation platform"

exclusion_criteria:
  hard_exclude:
    - "No DNA methylation data"
    - "Pure transcriptomic/proteomic/metabolomic clock without methylation component"
    - "Plant-only methylation aging"
    - "Forensic-only age prediction without biological aging relevance"

  soft_exclude:
    - "Cancer-only study with no aging-clock interpretation"
    - "Gestational age clock only"
    - "Developmental age clock only"
    - "Generic review with no brain, ovary, organ, tissue, or cell-type specificity"
    - "Mouse-only study unless methodologically important or directly relevant to ovary/brain aging"

priority_scoring:
  high_priority_rules:
    - "+4 if study develops a new brain, ovary, organ-specific, tissue-specific, or cell-type-specific methylation clock"
    - "+3 if title or abstract contains brain, cortex, cortical clock, hippocampus, neuron, glia, astrocyte, microglia, or oligodendrocyte"
    - "+3 if title or abstract contains ovary, ovarian, oocyte, granulosa cell, cumulus cell, follicular fluid, ovarian reserve, AMH, AFC, IVF, DOR, POI, or menopause"
    - "+2 if study analyzes age acceleration rather than only chronological age prediction"
    - "+2 if study includes external validation or independent cohort"
    - "+2 if study links methylation age to functional endpoint such as cognition, dementia, neuroimaging, AMH, AFC, oocyte yield, embryo quality, IVF outcome, or live birth"
    - "+1 if code is available"
    - "+1 if data are available in GEO, SRA, dbGaP, ArrayExpress, Zenodo, or GitHub"
    - "+1 if study handles cell composition or tissue heterogeneity explicitly"

  lower_priority_rules:
    - "-3 if forensic-only"
    - "-3 if no methylation data"
    - "-2 if cancer-only with no aging interpretation"
    - "-2 if only gestational or developmental age"
    - "-1 if review-only and not directly related to brain/ovary/organ clocks"
    - "-1 if no sample size or method details are reported"

  priority_labels:
    - "A: must_read"
    - "B: relevant"
    - "C: methods_only"
    - "D: background"
    - "E: exclude"

