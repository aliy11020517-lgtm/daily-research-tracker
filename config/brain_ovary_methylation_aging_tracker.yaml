extraction_prompt:
  system_instruction: >
    Extract structured information from each paper about DNA methylation aging,
    epigenetic clocks, biological age, organ-specific aging, brain aging,
    ovarian aging, and reproductive aging. Prioritize studies involving brain,
    ovary, tissue-specific clocks, cell-type-specific clocks, organ clocks,
    age acceleration, and aging pace.

  extraction_questions:
    - "Is this paper about DNA methylation or methylome-based aging?"
    - "Does it develop a new clock, apply an existing clock, compare clocks, or review the field?"
    - "Which organ, tissue, or cell type is studied?"
    - "Is the study relevant to brain aging, ovarian aging, reproductive aging, or organ-specific aging?"
    - "Which clock is used or developed?"
    - "What is the biological target: chronological age, biological age, mortality risk, disease risk, phenotype, or pace of aging?"
    - "What dataset and methylation platform are used?"
    - "What is the sample size?"
    - "Is there external validation?"
    - "Are code, coefficients, or data available?"
    - "What are the major limitations?"
    - "Why does this matter for brain/ovary methylation aging research?"

deduplication_rules:
  - "Deduplicate by DOI when available"
  - "If DOI is missing, deduplicate by normalized title"
  - "If preprint and peer-reviewed version both exist, keep both but mark relationship"
  - "Prefer peer-reviewed version for final citation"
  - "Keep preprint if it has newer data, code, or supplementary material not present in published version"

alert_rules:
  immediate_alert:
    - "New brain-specific methylation clock"
    - "New ovarian/reproductive methylation clock"
    - "New granulosa/cumulus/oocyte/follicular-fluid methylation aging study"
    - "New organ-specific or cell-type-specific DNAm clock"
    - "Large human cohort with brain or reproductive endpoints"
    - "Paper with public code and clock coefficients"

  weekly_digest:
    - "General epigenetic clock application"
    - "Methodological paper on clock construction"
    - "Review on biological age or methylation aging"
    - "Animal study relevant to ovary or brain aging"

  save_only:
    - "Generic blood-based aging clock not linked to brain/ovary"
    - "Forensic age estimator"
    - "Cancer-only methylation age paper"
    - "Gestational/developmental clock"

